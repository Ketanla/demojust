<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;  
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff; /* Initial Blue Theme */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #2c3e50;
        }

        button {
    width: 100%;
    padding: 12px;
    background-color: #28a745; /* Changed from #007bff to Green */
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}
button:hover { 
    background-color: #218838; /* Darker green hover state */
}
    </style>
</head>
<body>

<div class="container">
    <h2>SI Calculator</h2>
    <div class="input-group">
        <label for="principal">Principal Amount (P):</label>
        <input type="number" id="principal" placeholder="Enter Principal">
    </div>
    <div class="input-group">
        <label for="rate">Rate of Interest (R %):</label>
        <input type="number" id="rate" placeholder="Enter Rate">
    </div>
    <div class="input-group">
        <label for="years">Time in Years (N):</label>
        <input type="number" id="years" placeholder="Enter Years">
    </div>
    <button onclick="calculateSI()">Calculate</button>
    <div class="result" id="result"></div>
</div>

<script>
    function calculateSI() {
        let p = parseFloat(document.getElementById('principal').value);
        let r = parseFloat(document.getElementById('rate').value);
        let n = parseFloat(document.getElementById('years').value);
        
        if (isNaN(p) || isNaN(r) || isNaN(n)) {
            document.getElementById('result').innerText = "Please enter valid numbers.";
            return;
        }
        
        let si = (p * r * n) / 100;
        document.getElementById('result').innerText = "Simple Interest (SI) = ₹" + si.toFixed(2);
    }
</script>
</body>
</html>
